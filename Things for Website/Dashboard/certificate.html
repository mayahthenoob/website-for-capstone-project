<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Certificates</title>

  <!-- Boxicons CDN -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .certificate {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .certificate:hover {
      transform: scale(1.05);
    }

    .certificate img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    /* New close icon */
    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>My Certificates</h1>
</header>

<div class="container" id="certificateContainer"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <i class='bx bx-x close' onclick="closeModal()"></i>
  <img id="modalImg">
</div>

<script>
  const certificates = [
    { image: "R.jpg" },
    { image: "R.jpg" },
    { image: "R.jpg" }
  ];

  const container = document.getElementById("certificateContainer");

  certificates.forEach(cert => {
    const div = document.createElement("div");
    div.className = "certificate";

    div.innerHTML = `
      <img src="${cert.image}" alt="Certificate">
    `;

    div.onclick = () => openModal(cert.image);

    container.appendChild(div);
  });

  function openModal(src) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = src;
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }
</script>

</body>
</html>
