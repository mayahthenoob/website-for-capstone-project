<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Spelling Bee Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%);
    padding: 20px;
}

.form-container {
    background: #fff;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 800px;
}

h2 {
    margin: 0 0 30px;
    color: #666;
    font-weight: 500;
    text-align: center;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full-width {
    grid-column: span 2;
}

label {
    font-size: 14px;
    color: #555;
    margin-bottom: 8px;
}

input, textarea {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    width: 100%;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

input:focus, textarea:focus {
    border-color: #4a90e2;
    outline: none;
}

.radio-group {
    display: flex;
    gap: 25px;
    margin-top: 10px;
    align-items: center;
}

.radio-option {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    cursor: pointer;
}

.radio-option input {
    width: auto;
    accent-color: #4a90e2;
    cursor: pointer;
}

.submit-btn {
    background: #4a90e2;
    color: #fff;
    border: none;
    padding: 12px 35px;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 25px;
}

.submit-btn:hover {
    background: #357abd;
}

#wordsContainer {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.formatted-date, .total-time {
    font-size: 14px;
    color: #555;
    margin-top: 6px;
}

@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .form-group.full-width {
        grid-column: span 1;
    }

    #wordsContainer {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 480px) {
    #wordsContainer {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="form-container">
<h2>Spelling Bee Form</h2>

<form>
<div class="form-grid">

<!-- Title -->

<div class="form-group full-width">
<label for="title">Title</label>
<input type="text" id="title" required>
</div>

<!-- Description -->

<div class="form-group full-width">
<label for="description">Description</label>
<textarea id="description"></textarea>

<div class="radio-group">
<label class="radio-option">
<input type="radio" name="descriptionMode" value="default" checked>
Default
</label>

<label class="radio-option">
<input type="radio" name="descriptionMode" value="custom">
Custom
</label>
</div>
</div>

<!-- Speaker -->

<div class="form-group full-width">
<label>Speaker Voice</label>
<div class="radio-group">
<label class="radio-option">
<input type="radio" name="speakerVoice" value="default" checked> Default
</label>
<label class="radio-option">
<input type="radio" name="speakerVoice" value="random"> Random
</label>
<label class="radio-option">
<input type="radio" name="speakerVoice" value="select"> Select
</label>
</div>
</div>

<!-- Category -->

<div class="form-group">
<label>Category</label>
<input type="text">
</div>

<!-- Amount -->

<div class="form-group">
<label for="amount">Amount</label>
<input type="number" id="amount" min="1" max="32" required>
</div>

<!-- Words -->

<div class="form-group full-width">
<label>Words to Spell</label>
<div id="wordsContainer"></div>
</div>

<!-- Re-attempt -->

<div class="form-group full-width">
<label>Re-attempt</label>
<div class="radio-group">
<label class="radio-option"><input type="radio" name="reattempt" value="none" checked> None</label>
<label class="radio-option"><input type="radio" name="reattempt" value="two"> Two</label>
<label class="radio-option"><input type="radio" name="reattempt" value="three"> Three</label>
</div>
</div>

<!-- Opens -->

<div class="form-group">
<label for="opens">Opens</label>
<input type="datetime-local" id="opens">
<div id="opensFormatted" class="formatted-date"></div>
</div>

<!-- Closes -->

<div class="form-group">
<label for="closes">Closes</label>
<input type="datetime-local" id="closes">
<div id="closesFormatted" class="formatted-date"></div>
</div>

<!-- Time Limit -->

<div class="form-group full-width">
<label for="timeLimit">Time Limit (Minutes)</label>
<input type="number" id="timeLimit" min="0">
<div id="totalTime" class="total-time"></div>
</div>

</div>

<button class="submit-btn">Submit</button>

</form>
</div>

<script>
// WORD INPUT GENERATOR
const amountInput = document.getElementById("amount");
const wordsContainer = document.getElementById("wordsContainer");

amountInput.addEventListener("input", function () {
    let amount = parseInt(this.value);

    if (amount > 32) {
        amount = 32;
        this.value = 32;
    }

    if (amount < 1 || isNaN(amount)) {
        wordsContainer.innerHTML = "";
        return;
    }

    wordsContainer.innerHTML = "";

    for (let i = 1; i <= amount; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Word " + i;
        input.required = true;
        wordsContainer.appendChild(input);
    }
});

// DESCRIPTION MODE
const descRadios = document.querySelectorAll("input[name='descriptionMode']");
const descriptionField = document.getElementById("description");

descRadios.forEach(radio => {
    radio.addEventListener("change", function () {
        if (this.value === "default") {
            descriptionField.value = "Spell each word correctly within the allotted time.";
            descriptionField.readOnly = true;
        } else {
            descriptionField.value = "";
            descriptionField.readOnly = false;
        }
    });
});

// FORMAT DATE
function formatDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    return date.toLocaleString('en-GB', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });
}

document.getElementById("opens").addEventListener("change", function () {
    document.getElementById("opensFormatted").textContent =
        formatDateTime(this.value);
});

document.getElementById("closes").addEventListener("change", function () {
    document.getElementById("closesFormatted").textContent =
        formatDateTime(this.value);
});

// TIME LIMIT DISPLAY
const timeLimitInput = document.getElementById("timeLimit");
const totalTimeDisplay = document.getElementById("totalTime");

timeLimitInput.addEventListener("input", function () {
    const minutes = parseInt(this.value);

    if (isNaN(minutes) || minutes < 0) {
        totalTimeDisplay.textContent = "";
        return;
    }

    if (minutes < 60) {
        totalTimeDisplay.textContent =
            `${minutes} Minute${minutes !== 1 ? 's' : ''}`;
    } else {
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;

        if (remainingMinutes === 0) {
            totalTimeDisplay.textContent =
                `${hours} Hour${hours !== 1 ? 's' : ''}`;
        } else {
            totalTimeDisplay.textContent =
                `${hours} Hour${hours !== 1 ? 's' : ''} : ${remainingMinutes} Minute${remainingMinutes !== 1 ? 's' : ''}`;
        }
    }
});
</script>

</body>
</html>
