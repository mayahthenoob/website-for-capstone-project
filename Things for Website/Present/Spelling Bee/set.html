<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Control Center Clone</title>
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.2);
            --bg-active: rgba(255, 255, 255, 0.9);
            --blur: blur(20px);
        }

        body {
            background: linear-gradient(180deg, #b06ab3, #4568dc);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Main Container */
        .control-center {
            width: 350px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 15px;
            padding: 20px;
        }

        /* Shared Styling for Widgets */
        .widget {
            background: var(--bg-glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Connectivity Block (2x2) */
        .connectivity {
            grid-column: span 2;
            grid-row: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 10px;
            padding: 15px;
        }

        .icon-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .icon-circle.active-blue { background: #007aff; }
        .icon-circle.active-green { background: #4cd964; }

        /* Music Block (2x2) */
        .music-player {
            grid-column: span 2;
            grid-row: span 2;
            flex-direction: column;
            padding: 15px;
            text-align: center;
        }

        /* Sliders (Tall) */
        .slider-container {
            grid-row: span 2;
            height: 160px;
            width: 100%;
            position: relative;
            overflow: hidden;
            background: var(--bg-glass);
            border-radius: 22px;
        }

        .slider-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--bg-active);
            height: 60%; /* Default Level */
            transition: height 0.1s ease-out;
        }

        .slider-icon {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            z-index: 2;
            mix-blend-mode: exclusion;
            font-size: 20px;
        }

        /* Small Buttons (1x1) */
        .small-btn {
            height: 75px;
            font-size: 24px;
        }

        /* Focus Mode (2x1) */
        .focus-mode {
            grid-column: span 2;
            height: 75px;
            justify-content: flex-start;
            padding-left: 15px;
            gap: 10px;
            font-size: 16px;
        }

        span { font-weight: 500; }
    </style>
</head>
<body>

<div class="control-center">
    
    <div class="widget connectivity">
        <div class="icon-circle">✈️</div>
        <div class="icon-circle active-green">📶</div>
        <div class="icon-circle active-blue">📶</div>
        <div class="icon-circle active-blue">🎧</div>
    </div>

    <div class="widget music-player">
        <div style="font-size: 12px; opacity: 0.7;">Sleep, Forever</div>
        <div style="font-size: 14px; margin-bottom: 15px;">Madder Rose</div>
        <div style="display: flex; gap: 20px; font-size: 20px;">
            <span>⏮</span> <span>▶️</span> <span>⏭</span>
        </div>
    </div>

    <div class="widget small-btn">🔒</div>
    <div class="widget small-btn">📺</div>

    <div class="widget focus-mode">
        <span>🌙</span> Focus
    </div>

    <div class="slider-container">
        <div class="slider-fill" style="height: 70%; background: #fff;"></div>
        <div class="slider-icon">☀️</div>
    </div>

    <div class="slider-container" id="vol-container">
        <div class="slider-fill" id="vol-fill"></div>
        <div class="slider-icon" id="vol-icon">🔊</div>
    </div>

    <div class="widget small-btn">🔦</div>
    <div class="widget small-btn">⏰</div>
    <div class="widget small-btn">🧮</div>
    <div class="widget small-btn">📷</div>
    <div class="widget small-btn">🏠</div>
    <div class="widget small-btn">🎙️</div>
    <div class="widget small-btn">🔋</div>
    <div class="widget small-btn">🌓</div>

</div>

<script>
    const volContainer = document.getElementById('vol-container');
    const volFill = document.getElementById('vol-fill');
    const volIcon = document.getElementById('vol-icon');

    function handleVolume(e) {
        const rect = volContainer.getBoundingClientRect();
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        let offset = rect.bottom - clientY;
        let percentage = (offset / rect.height) * 100;
        
        // Clamp values
        percentage = Math.max(0, Math.min(100, percentage));
        
        volFill.style.height = percentage + '%';

        // Icon Logic
        if (percentage === 0) volIcon.innerText = "🔇";
        else if (percentage < 50) volIcon.innerText = "🔉";
        else volIcon.innerText = "🔊";
    }

    let isDragging = false;

    volContainer.addEventListener('mousedown', (e) => {
        isDragging = true;
        handleVolume(e);
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) handleVolume(e);
    });

    window.addEventListener('mouseup', () => isDragging = false);

    // Touch Support
    volContainer.addEventListener('touchstart', (e) => {
        isDragging = true;
        handleVolume(e);
    });
    window.addEventListener('touchmove', (e) => {
        if (isDragging) handleVolume(e);
    });
    window.addEventListener('touchend', () => isDragging = false);
</script>

</body>
</html>
