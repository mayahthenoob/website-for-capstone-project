<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            line-height: 1.6;
        }

        .navbar {
            background-color: #111827;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar span {
            color: white;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .logo img {
            height: 35px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 { 
            font-size: 2rem; 
            margin-bottom: 40px;
        }

        /* Quiz Info Sections */
        .quiz-dates, .quiz-details {
            font-size: 0.95rem;
        }

        /* Updated quiz-dates with orange rectangle */
        .quiz-dates {
            margin-bottom: 40px;
            background-color: orange; /* orange rectangle */
            padding: 15px 20px;       /* spacing inside rectangle */
            border-radius: 6px;       /* rounded corners */
            color: white;             /* text color for contrast */
        }

        .quiz-details {
            margin-top: 40px; /* increased to match spacing above */
        }

        hr { 
            border: 0; 
            border-top: 1px solid #eee; 
            margin: 20px 0; 
        }

        .actions {
            margin-top: 40px;
            display: flex;
            justify-content: flex-start; /* Align buttons horizontally at start */
            gap: 10px; /* Space between buttons */
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-primary { 
            background-color: #007bff; 
            color: white; 
        }

        .btn-primary:hover { 
            background-color: #0056b3; 
        }

        .btn-secondary { 
            background-color: #adb5bd; 
            color: #333; 
        }

        .btn-secondary:hover { 
            background-color: #8e9499; 
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Quiz Carnival Logo"> 
            <span>Quiz Carnival</span>
        </div>
    </header>

    <main class="container">
        <h1>Mathematics</h1>

        <!-- Section 1: Open/Close Dates -->
        <section class="quiz-dates">
            <p><strong>Opened:</strong> Monday, 30 March 2026, 11:06 AM</p>
            <p><strong>Closes:</strong> Monday, 6 April 2026, 11:06 AM</p>
        </section>

        <section class="quiz-details">
            <p>Attempts allowed: 2</p>
            <p>This quiz has been configured so that students may only attempt it using the Safe Exam Browser.</p>
            <p>Time limit: 20 mins</p>
            <p>Grading method: Highest grade</p>
        </section>

        <footer class="actions">
            <button class="btn btn-secondary" onclick="goBack()">Back to the course</button>
            <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
        </footer>
    </main>

    <script>
        function goBack() {
            alert("Redirecting to the course main page...");
            // window.location.href = 'course_home.html';
        }

        function startQuiz() {
            alert("Starting quiz...");
            // window.location.href = 'quiz_page.html';
        }

        window.onload = () => {
            console.log("Quiz status loaded.");
        };
    </script>

</body>
</html>
