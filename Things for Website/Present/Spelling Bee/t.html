<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Control Center - Custom Icons</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.2);
            --bg-active: rgba(255, 255, 255, 0.9);
            --blur: blur(20px);
            --dark-color: #2b2b2b;
            --light-color: #f7f7f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #b06ab3, #4568dc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.3s ease;
        }

        body.darkmode {
            background: #1a1a1a;
        }

        /* Main Grid */
        .control-center {
            width: 350px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 15px;
            padding: 20px;
        }

        .widget {
            background: var(--bg-glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Connectivity */
        .connectivity {
            grid-column: span 2; grid-row: span 2;
            display: grid; grid-template-columns: 1fr 1fr;
            grid-gap: 10px; padding: 15px;
        }

        .icon-circle {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px;
        }
        .active-blue { background: #007aff; }
        .active-green { background: #4cd964; }

        /* Music Block */
        .music-player {
            grid-column: span 2; grid-row: span 2;
            flex-direction: column; padding: 15px;
        }
        .music-player i { font-size: 28px; cursor: pointer; }

        /* Sliders */
        .slider-container {
            grid-row: span 2; height: 160px;
            position: relative; overflow: hidden;
            background: var(--bg-glass); border-radius: 22px;
            backdrop-filter: var(--blur);
        }

        .slider-fill {
            position: absolute; bottom: 0; width: 100%;
            background: var(--bg-active); height: 60%;
            transition: height 0.1s ease-out;
        }

        .slider-icon {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; z-index: 2;
            mix-blend-mode: exclusion; font-size: 24px; color: white;
        }

        /* Animated Toggle (fills entire 2x1 grid cell) */
        .toggle-widget {
            grid-column: span 2; 
            height: 100%;           /* fill full grid row */
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 0;             /* remove outer spacing */
        }

        .btn-toggle {
            width: 100%;             /* fill entire container */
            height: 100%;            /* fill entire container */
            border-radius: 20px;     /* optional: rounded corners */
            display: flex; 
            justify-content: center; 
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn__indicator {
            width: 50%;               /* smaller than container */
            height: 80%; 
            border-radius: 50%; 
            position: absolute; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .btn__icon { color: #FFDE59; font-size: 1.5rem; transition: color 0.3s ease; }
        
        .darkmode .btn-toggle { background-color: #444; }
        .darkmode .btn__indicator { transform: translateX(50%); background-color: var(--dark-color); }
        .darkmode .btn__icon { color: #fff; }

        .animated { animation: spin 0.5s; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Standard Small Buttons */
        .small-btn { height: 75px; font-size: 24px; }
    </style>
</head>
<body>

<div class="control-center">
    
    <div class="widget connectivity">
        <div class="icon-circle"><i class='bx bxs-plane'></i></div>
        <div class="icon-circle active-green"><i class='bx bx-broadcast'></i></div>
        <div class="icon-circle active-blue"><i class='bx bx-wifi'></i></div>
        <div class="icon-circle active-blue"><i class='bx bx-bluetooth'></i></div>
    </div>

    <div class="widget music-player">
        <div style="font-size: 11px; opacity: 0.7;">Sleep, Forever</div>
        <div style="font-size: 13px; margin-bottom: 12px; font-weight: bold;">Madder Rose</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <i class='bx bx-skip-previous'></i>
            <i class='bx bx-play' id="play-btn"></i>
            <i class='bx bx-skip-next'></i>
        </div>
    </div>

    <div class="widget small-btn"><i class='bx bx-lock-alt'></i></div>
    <div class="widget small-btn"><i class='bx bx-copy'></i></div>

    <div class="widget toggle-widget">
        <div class="btn-toggle" id="theme-toggle">
            <div class="btn__indicator">
                <i class="btn__icon bx bx-sun" id="toggle-icon"></i>
            </div>
        </div>
    </div>

    <!-- Brightness Slider replaced with Tachometer -->
    <div class="slider-container">
        <div class="slider-fill" style="height: 75%;"></div>
        <div class="slider-icon"><i class='bx bx-tachometer'></i></div>
    </div>

    <div class="slider-container" id="vol-container">
        <div class="slider-fill" id="vol-fill"></div>
        <div class="slider-icon">
            <i class='bx bx-volume-full' id="vol-icon"></i>
        </div>
    </div>

    <div class="widget small-btn"><i class='bx bx-flashlight'></i></div>
    <div class="widget small-btn"><i class='bx bx-timer'></i></div>
    <div class="widget small-btn"><i class='bx bx-calculator'></i></div>
    <div class="widget small-btn"><i class='bx bx-camera'></i></div>

</div>

<script>
    // --- Theme Toggle Logic ---
    const themeBtn = document.getElementById('theme-toggle');
    const toggleIcon = document.getElementById('toggle-icon');
    const body = document.body;

    themeBtn.addEventListener('click', () => {
        body.classList.toggle('darkmode');
        toggleIcon.classList.add('animated');

        if (body.classList.contains('darkmode')) {
            toggleIcon.classList.replace('bx-sun', 'bx-moon');
        } else {
            toggleIcon.classList.replace('bx-moon', 'bx-sun');
        }

        setTimeout(() => toggleIcon.classList.remove('animated'), 500);
    });

    // --- Volume Slider Logic ---
    const volContainer = document.getElementById('vol-container');
    const volFill = document.getElementById('vol-fill');
    const volIcon = document.getElementById('vol-icon');

    function updateVolume(e) {
        const rect = volContainer.getBoundingClientRect();
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        let percentage = ((rect.bottom - y) / rect.height) * 100;
        percentage = Math.max(0, Math.min(100, percentage));
        
        volFill.style.height = percentage + '%';

        if (percentage === 0) {
            volIcon.className = 'bx bx-volume-mute';
        } else if (percentage < 50) {
            volIcon.className = 'bx bx-volume-low';
        } else {
            volIcon.className = 'bx bx-volume-full';
        }
    }

    let isDragging = false;
    const startDrag = (e) => { isDragging = true; updateVolume(e); };
    const doDrag = (e) => { if (isDragging) updateVolume(e); };
    const stopDrag = () => isDragging = false;

    volContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', stopDrag);

    volContainer.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', doDrag);
    window.addEventListener('touchend', stopDrag);

    // --- Play/Pause Toggle Logic ---
    const playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', () => {
        if (playBtn.classList.contains('bx-play')) {
            playBtn.classList.replace('bx-play', 'bx-pause');
        } else {
            playBtn.classList.replace('bx-pause', 'bx-play');
        }
    });
</script>

</body>
</html>
