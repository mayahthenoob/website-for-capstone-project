<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Control Center - Refined Toggle</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.2);
            --bg-active: rgba(255, 255, 255, 0.9);
            --blur: blur(25px);
            --dark-color: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(180deg, #b06ab3, #4568dc);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.darkmode { background: #0f0f0f; }

        /* Main Grid */
        .control-center {
            width: 350px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 15px;
            padding: 20px;
        }

        .widget {
            background: var(--bg-glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Connectivity */
        .connectivity {
            grid-column: span 2; grid-row: span 2;
            display: grid; grid-template-columns: 1fr 1fr;
            grid-gap: 10px; padding: 15px;
        }

        .icon-circle {
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px;
        }
        .active-blue { background: #007aff; }
        .active-green { background: #4cd964; }

        /* Music Block */
        .music-player {
            grid-column: span 2; grid-row: span 2;
            flex-direction: column; padding: 15px;
        }
        .music-player i { font-size: 28px; }

        /* Sliders */
        .slider-container {
            grid-row: span 2; height: 160px;
            position: relative; overflow: hidden;
            background: var(--bg-glass); border-radius: 22px;
            backdrop-filter: var(--blur);
        }

        .slider-fill {
            position: absolute; bottom: 0; width: 100%;
            background: var(--bg-active); height: 60%;
            transition: height 0.1s ease-out;
        }

        .slider-icon {
            position: absolute; bottom: 15px; width: 100%;
            text-align: center; z-index: 2;
            mix-blend-mode: exclusion; font-size: 24px; color: white;
        }

        /* Borderless Large Toggle */
        .toggle-widget {
            grid-column: span 2; 
            height: 75px;
            padding: 0; /* Remove padding to let indicator fill area */
            background: var(--bg-glass);
        }

        .btn-indicator {
            width: 50%; /* Half the width of the 2-column span */
            height: 100%;
            background: #fff;
            position: absolute;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .btn-icon { color: #FFDE59; font-size: 2rem; transition: color 0.3s ease; }
        
        .darkmode .btn-indicator { 
            transform: translateX(100%); 
            background-color: #333; 
        }
        .darkmode .btn-icon { color: #fff; }

        .animated { animation: spin 0.5s; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Standard Small Buttons */
        .small-btn { height: 75px; font-size: 24px; }
    </style>
</head>
<body>

<div class="control-center">
    
    <div class="widget connectivity">
        <div class="icon-circle"><i class='bx bxs-plane'></i></div>
        <div class="icon-circle active-green"><i class='bx bx-broadcast'></i></div>
        <div class="icon-circle active-blue"><i class='bx bx-wifi'></i></div>
        <div class="icon-circle active-blue"><i class='bx bx-bluetooth'></i></div>
    </div>

    <div class="widget music-player">
        <div style="font-size: 11px; opacity: 0.7;">Sleep, Forever</div>
        <div style="font-size: 13px; margin-bottom: 12px; font-weight: bold;">Madder Rose</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <i class='bx bx-skip-previous'></i>
            <i class='bx bx-play' id="play-btn"></i>
            <i class='bx bx-skip-next'></i>
        </div>
    </div>

    <div class="widget small-btn"><i class='bx bx-lock-alt'></i></div>
    <div class="widget small-btn"><i class='bx bx-copy'></i></div>

    <div class="widget toggle-widget" id="theme-toggle">
        <div class="btn-indicator">
            <i class="btn-icon bx bx-sun" id="toggle-icon"></i>
        </div>
    </div>

    <div class="slider-container">
        <div class="slider-fill" style="height: 45%;"></div>
        <div class="slider-icon"><i class='bx bx-tachometer'></i></div>
    </div>

    <div class="slider-container" id="vol-container">
        <div class="slider-fill" id="vol-fill"></div>
        <div class="slider-icon">
            <i class='bx bx-volume-full' id="vol-icon"></i>
        </div>
    </div>

    <div class="widget small-btn"><i class='bx bx-flashlight'></i></div>
    <div class="widget small-btn"><i class='bx bx-timer'></i></div>
    <div class="widget small-btn"><i class='bx bx-calculator'></i></div>
    <div class="widget small-btn"><i class='bx bx-camera'></i></div>

</div>

<script>
    // --- Theme Toggle Logic ---
    const themeBtn = document.getElementById('theme-toggle');
    const toggleIcon = document.getElementById('toggle-icon');

    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('darkmode');
        toggleIcon.classList.add('animated');

        if (document.body.classList.contains('darkmode')) {
            toggleIcon.classList.replace('bx-sun', 'bx-moon');
        } else {
            toggleIcon.classList.replace('bx-moon', 'bx-sun');
        }

        setTimeout(() => toggleIcon.classList.remove('animated'), 500);
    });

    // --- Volume Slider Logic ---
    const volContainer = document.getElementById('vol-container');
    const volFill = document.getElementById('vol-fill');
    const volIcon = document.getElementById('vol-icon');

    function updateVolume(e) {
        const rect = volContainer.getBoundingClientRect();
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        let percentage = ((rect.bottom - y) / rect.height) * 100;
        percentage = Math.max(0, Math.min(100, percentage));
        
        volFill.style.height = percentage + '%';

        if (percentage === 0) {
            volIcon.className = 'bx bx-volume-mute';
        } else if (percentage < 50) {
            volIcon.className = 'bx bx-volume-low';
        } else {
            volIcon.className = 'bx bx-volume-full';
        }
    }

    let isDragging = false;
    volContainer.addEventListener('mousedown', (e) => { isDragging = true; updateVolume(e); });
    window.addEventListener('mousemove', (e) => { if (isDragging) updateVolume(e); });
    window.addEventListener('mouseup', () => isDragging = false);

    // --- Play/Pause Toggle ---
    const playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', () => {
        playBtn.classList.toggle('bx-play');
        playBtn.classList.toggle('bx-pause');
    });
</script>

</body>
</html>
