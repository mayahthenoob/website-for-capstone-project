<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #f4f6f9;
  min-height: 100vh;
}

/* Layout */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
.header {
  height: 80px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 30px;
  border-bottom: 1px solid #e6e9ef;
}

/* Right Section */
.header-right {
  display: flex;
  align-items: center;
  gap: 25px;
}

.msg-icon {
  font-size: 24px;
  color: #555;
  cursor: pointer;
  display: flex;
  align-items: center;
}

/* Profile */
.profile-container {
  position: relative;
}

.profile {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 8px;
  transition: 0.2s;
}

.profile:hover {
  background: #f0f2f5;
}

.profile img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}

.profile span {
  font-weight: 500;
  color: #333;
}

/* Dropdown */
.dropdown-menu {
  position: absolute;
  top: 110%;
  right: 0;
  width: 200px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  border: 1px solid #eee;
  display: none; 
  flex-direction: column;
  padding: 10px 0;
  z-index: 1000;
}

.dropdown-menu.show {
  display: flex;
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  text-decoration: none;
  color: #444;
  font-size: 14px;
  transition: 0.2s;
}

.dropdown-item i {
  font-size: 18px;
  color: #777;
}

.dropdown-item:hover {
  background: #f8f9fa;
  color: #007bff;
}

.dropdown-item:hover i {
  color: #007bff;
}

/* Content */
.content {
  flex: 1;
  padding: 40px;
}
</style>

</head>

<body>

<div class="main">

  <!-- Header -->

  <div class="header">

<div class="header-right">

  <div class="msg-icon">
    <i class='bx bx-bell'></i>
  </div>

  <div class="msg-icon">
    <i class='bx bx-message'></i>
  </div>

  <!-- Profile -->
  <div class="profile-container">
    <div class="profile" onclick="toggleDropdown()">
      <img src="R.jpg" alt="Profile">
      <span>Alan Walker</span>
      <i class='bx bx-chevron-down'></i>
    </div>

    <!-- Dropdown -->
    <div class="dropdown-menu" id="profileDropdown">
      <a href="#" class="dropdown-item"><i class='bx bxs-user-circle'></i> Profile</a>
      <a href="#" class="dropdown-item"><i class='bx bx-line-chart'></i> Grades</a>
      <a href="calender.html" class="dropdown-item"><i class='bx bx-calendar'></i> Calendar</a>
      <a href="#" class="dropdown-item"><i class='bx bx-message'></i> Messages</a>
      <a href="#" class="dropdown-item"><i class='bx bx-share-alt'></i> Share</a>
      <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">
      <a href="#" class="dropdown-item"><i class='bx bx-log-in'></i> Logout</a>
    </div>
  </div>

</div>

  </div>
  <div class="content">
  </div>

</div>

<script>
function toggleDropdown() {
  document.getElementById("profileDropdown").classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.closest('.profile-container')) {
    const dropdowns = document.getElementsByClassName("dropdown-menu");
    for (let i = 0; i < dropdowns.length; i++) {
      dropdowns[i].classList.remove('show');
    }
  }
}
</script>

</body>
</html>
