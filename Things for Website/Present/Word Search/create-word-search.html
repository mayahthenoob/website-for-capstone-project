<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Word Puzzle Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%);
    padding: 20px;
}

.form-container {
    background-color: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 900px;
}

h2 {
    margin-top: 0;
    color: #666;
    font-weight: 500;
    margin-bottom: 30px;
    text-align: center;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full-width {
    grid-column: span 2;
}

label {
    font-size: 14px;
    color: #777;
    margin-bottom: 8px;
}

input, textarea {
    padding: 12px;
    border: 1px solid #f2f2f2;
    background-color: #f9f9f9;
    border-radius: 4px;
    font-size: 14px;
    color: #333;
    outline: none;
    width: 100%;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

input:focus, textarea:focus {
    border-color: #4a90e2;
}

.radio-group {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: 12px;
}

.reattempt-group .radio-group {
    margin-top: 4px;
}

.radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #333;
}

.radio-option label {
    margin: 0;
    cursor: pointer;
}

.radio-option input[type="radio"] {
    margin: 0;
    transform: translateY(1px);
    cursor: pointer;
    width: auto;
}

/* BUTTONS */
.button-row {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.action-btn {
    border: none;
    padding: 12px 30px;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.preview-btn {
    background-color: #999;
    color: white;
}

.preview-btn:hover {
    background-color: #777;
}

.next-btn {
    background-color: #4a90e2;
    color: white;
}

.next-btn:hover {
    background-color: #357abd;
}

.publish-btn {
    background-color: #28a745;
    color: white;
}

.publish-btn:hover {
    background-color: #1e7e34;
}

#wordsContainer {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.formatted-date, .total-time {
    font-size: 14px;
    color: #555;
    margin-top: 6px;
}

/* Interactive Design Grid */
.grid-design {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    grid-template-rows: repeat(10, 40px);
    gap: 2px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

.grid-design .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    cursor: text;
    user-select: text;
    font-size: 18px;
    overflow: hidden;
    line-height: 1;
}

/* Responsive */
@media (max-width: 900px) {
    #wordsContainer {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
    .form-group.full-width {
        grid-column: span 1;
    }
    .form-container {
        padding: 20px;
    }

    #wordsContainer {
        grid-template-columns: 1fr;
    }

    .button-row {
        flex-direction: column;
        gap: 10px;
    }

    .grid-design {
        grid-template-columns: repeat(10, 30px);
        grid-template-rows: repeat(10, 30px);
    }
}
</style>
</head>

<body>

<div class="form-container">
<h2>Word Search Form</h2>

<form>
<div class="form-grid">

<!-- Title -->
<div class="form-group full-width">
<label for="title">Title</label>
<input type="text" id="title" name="title" placeholder="Title of Word Search" required>
</div>

<!-- Description -->
<div class="form-group full-width">
<label for="description">Description</label>
<textarea id="description" name="description"></textarea>

<div class="radio-group">
<div class="radio-option">
<input type="radio" id="default" name="mode" value="default">
<label for="default">Default</label>
</div>
<div class="radio-option">
<input type="radio" id="custom" name="mode" value="custom" checked>
<label for="custom">Custom</label>
</div>
</div>
</div>

<!-- Category -->
<div class="form-group">
<label for="category">Category</label>
<input type="text" id="category" name="category">
</div>

<!-- Amount of Words -->
<div class="form-group">
<label for="amount">Amount</label>
<input type="number" id="amount" name="amount" min="1" max="32" required>
</div>

<!-- Words -->
<div class="form-group full-width">
<label>Words to Find</label>
<div id="wordsContainer"></div>
</div>

<!-- Word Search Design -->
<div class="form-group full-width">
<label>Word Search Design Mode</label>
<div class="radio-group">
    <div class="radio-option">
        <input type="radio" id="modeCustom" name="designMode" value="custom" checked>
        <label for="modeCustom">Custom</label>
    </div>
    <div class="radio-option">
        <input type="radio" id="modeDefault" name="designMode" value="default">
        <label for="modeDefault">Default (auto-fill)</label>
    </div>
</div>
<div id="designGrid" class="grid-design"></div>
</div>

<!-- Re-attempt -->
<div class="form-group full-width reattempt-group">
<label>Re-attempt</label>
<div class="radio-group">
<div class="radio-option">
<input type="radio" name="reattempt" value="none" checked>
<label>None</label>
</div>
<div class="radio-option">
<input type="radio" name="reattempt" value="two">
<label>Two</label>
</div>
<div class="radio-option">
<input type="radio" name="reattempt" value="three">
<label>Three</label>
</div>
</div>
</div>

<!-- Opens -->
<div class="form-group">
<label for="opens">Opens</label>
<input type="datetime-local" id="opens" name="opens">
<div id="opensFormatted" class="formatted-date"></div>
</div>

<!-- Closes -->
<div class="form-group">
<label for="closes">Closes</label>
<input type="datetime-local" id="closes" name="closes">
<div id="closesFormatted" class="formatted-date"></div>
</div>

<!-- Time Limit -->
<div class="form-group full-width">
<label for="timeLimit">Time Limit (Minutes)</label>
<input type="number" id="timeLimit" min="0" placeholder="Enter minutes">
<div id="totalTime" class="total-time"></div>
</div>

</div>

<!-- Buttons -->
<div class="button-row">
<button type="button" class="action-btn preview-btn">Preview</button>
<button type="button" class="action-btn publish-btn">Publish</button>
</div>

</form>
</div>

<script>
// ------------------------
// Words to Find Uppercase
// ------------------------
const amountInput = document.getElementById("amount");
const wordsContainer = document.getElementById("wordsContainer");

amountInput.addEventListener("input", function () {
    let amount = parseInt(this.value);
    if (amount > 32) { amount = 32; this.value = 32; }
    if (amount < 1 || isNaN(amount)) { wordsContainer.innerHTML = ""; return; }

    wordsContainer.innerHTML = "";
    for (let i = 1; i <= amount; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Word " + i;
        input.required = true;

        // Convert input to uppercase automatically
        input.addEventListener("input", () => {
            input.value = input.value.toUpperCase().replace(/[^A-Z]/g, '');
        });

        wordsContainer.appendChild(input);
    }
});

// ------------------------
// Description default/custom
// ------------------------
const defaultRadio = document.getElementById("default");
const customRadio = document.getElementById("custom");
const descriptionField = document.getElementById("description");

defaultRadio.addEventListener("change", function () {
    if (this.checked) {
        descriptionField.value = "This is a word search puzzle that should be completed in the allotted time";
        descriptionField.readOnly = true;
    }
});
customRadio.addEventListener("change", function () {
    if (this.checked) {
        descriptionField.value = "";
        descriptionField.readOnly = false;
    }
});

// ------------------------
// Format Opens/Closes
// ------------------------
function formatDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    return date.toLocaleString('en-GB', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });
}

const opensInput = document.getElementById("opens");
const closesInput = document.getElementById("closes");

opensInput.addEventListener("change", function () {
    document.getElementById("opensFormatted").textContent =
        formatDateTime(this.value);
});

closesInput.addEventListener("change", function () {
    document.getElementById("closesFormatted").textContent =
        formatDateTime(this.value);
});

// ------------------------
// Time Limit display
// ------------------------
const timeLimitInput = document.getElementById("timeLimit");
const totalTimeDisplay = document.getElementById("totalTime");

timeLimitInput.addEventListener("input", function () {
    const minutes = parseInt(this.value);
    if (isNaN(minutes) || minutes < 0) { totalTimeDisplay.textContent = ""; return; }

    if (minutes < 60) {
        totalTimeDisplay.textContent = `${minutes} Minute${minutes !== 1 ? 's' : ''}`;
    } else {
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;
        if (remainingMinutes === 0) {
            totalTimeDisplay.textContent = `${hours} Hour${hours !== 1 ? 's' : ''}`;
        } else {
            totalTimeDisplay.textContent =
                `${hours} Hour${hours !== 1 ? 's' : ''} : ${remainingMinutes} Minute${remainingMinutes !== 1 ? 's' : ''}`;
        }
    }
});

// ------------------------
// Word Search Design Grid with Paste Support
// ------------------------
const designGrid = document.getElementById("designGrid");
const gridSize = 10;
let designMode = "custom";

// Helper: get next cell by row and column
function getNextCell(r, c) {
    if (c < gridSize - 1) return designGrid.querySelector(`.cell[data-row='${r}'][data-col='${c+1}']`);
    if (r < gridSize - 1) return designGrid.querySelector(`.cell[data-row='${r+1}'][data-col='0']`);
    return null;
}

// Create grid
for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.row = r;
        cell.dataset.col = c;

        cell.contentEditable = true;
        cell.style.textAlign = "center";
        cell.style.userSelect = "text";

        // Input handler: only letters, auto-uppercase, move to next cell
        cell.addEventListener("input", () => {
            let char = cell.textContent.toUpperCase().replace(/[^A-Z]/g, '');
            char = char.charAt(0) || "";
            cell.textContent = char;

            if (char.length > 0) {
                const nextCell = getNextCell(r, c);
                if (nextCell) nextCell.focus();
            }
        });

        // Paste handler: spread letters across cells
        cell.addEventListener("paste", (e) => {
            e.preventDefault();
            let pasteText = (e.clipboardData || window.clipboardData).getData('text');
            pasteText = pasteText.toUpperCase().replace(/[^A-Z]/g, '');
            let currentRow = r;
            let currentCol = c;

            for (let i = 0; i < pasteText.length; i++) {
                const targetCell = designGrid.querySelector(`.cell[data-row='${currentRow}'][data-col='${currentCol}']`);
                if (!targetCell) break;
                targetCell.textContent = pasteText[i];

                // Move to next cell
                if (currentCol < gridSize - 1) currentCol++;
                else if (currentRow < gridSize - 1) {
                    currentCol = 0;
                    currentRow++;
                } else break;
            }

            const lastCell = designGrid.querySelector(`.cell[data-row='${currentRow}'][data-col='${currentCol}']`);
            if (lastCell) lastCell.focus();
        });

        // Allow only letters on keydown
        cell.addEventListener("keydown", (e) => {
            if (e.key.length === 1 && !e.key.match(/[a-zA-Z]/)) {
                e.preventDefault();
            }
        });

        designGrid.appendChild(cell);
    }
}

// Mode radio buttons (custom/default)
const modeCustomRadio = document.getElementById("modeCustom");
const modeDefaultRadio = document.getElementById("modeDefault");

modeCustomRadio.addEventListener("change", () => { if (modeCustomRadio.checked) designMode = "custom"; });
modeDefaultRadio.addEventListener("change", () => {
    if (modeDefaultRadio.checked) {
        designMode = "default";
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const cells = designGrid.querySelectorAll(".cell");
        cells.forEach(cell => {
            if (!cell.textContent.trim()) {
                cell.textContent = letters.charAt(Math.floor(Math.random() * letters.length));
            }
        });
    }
});

// Save design grid on publish
const publishBtn = document.querySelector(".publish-btn");
publishBtn.addEventListener("click", () => {
    const gridData = [];
    for (let r = 0; r < gridSize; r++) {
        const row = [];
        for (let c = 0; c < gridSize; c++) {
            const cell = designGrid.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
            row.push(cell.textContent.toUpperCase() || "");
        }
        gridData.push(row);
    }
    console.log("Word Search Design Mode:", designMode);
    console.log("Word Search Design Grid:", gridData);
    alert("Word Search Design saved! Check console for data.");
});
</script>

</body>
</html>
